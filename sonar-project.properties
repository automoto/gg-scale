sonar.projectKey=automoto_gg-scale
sonar.organization=automoto

# Generated code is committed (so CI needs no codegen toolchain) but is never
# hand-edited — it is reproduced by `make templ-generate`, `make sqlc-gen`, and
# protoc. Analysing it only produces unactionable cognitive-complexity and
# duplicate-literal noise, so it is excluded from analysis entirely.
sonar.exclusions=\
  **/*_templ.go,\
  **/*.pb.go,\
  **/*_grpc.pb.go,\
  internal/db/sqlc/**

# Generated files are also irrelevant to coverage and duplication metrics.
sonar.coverage.exclusions=\
  **/*_templ.go,\
  **/*.pb.go,\
  **/*_grpc.pb.go,\
  internal/db/sqlc/**
sonar.cpd.exclusions=\
  **/*_templ.go,\
  **/*.pb.go,\
  **/*_grpc.pb.go,\
  internal/db/sqlc/**
