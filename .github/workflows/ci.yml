name: CI

on:
  workflow_dispatch: # disabled: re-add push/pull_request triggers when fixed

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only. Jobs that need more elevate themselves.
permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"

jobs:

  lint-test:
    name: Lint and unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify go.mod
        run: go mod verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@8564da7cb3c6866ed1da648ca8f00a258ef0c802 # v6.5.2
        with:
          version: v2.11.4

      - name: go test -race
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  docker-build:
    name: Build server image
    runs-on: ubuntu-24.04
    # Read-only; no GHCR push from this job. Publishing happens in
    # `docker-publish`, which runs only on main pushes.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build (export tarball)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          tags: |
            ghcr.io/${{ github.repository }}/ggscale-server:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ggscale-server:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}
          outputs: type=docker,dest=/tmp/ggscale-server.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ggscale-server-image
          path: /tmp/ggscale-server.tar
          retention-days: 1

  e2e:
    name: End-to-end (compose + Agones)
    runs-on: ubuntu-24.04
    needs: docker-build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install kernel deps for k3s
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y conntrack iptables socat

      - name: Download server image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ggscale-server-image
          path: /tmp

      - name: Load server image
        run: |
          docker load -i /tmp/ggscale-server.tar
          docker tag "ghcr.io/${{ github.repository }}/ggscale-server:${{ github.sha }}" ggscale-server:dev

      - name: Prepare .env
        run: cp .env.example .env

      - name: Bring up lite stack
        run: docker compose up -d --wait

      - name: Bring up k8s profile
        env:
          GGSCALE_SKIP_COLIMA_CHECK: "1"
        run: |
          mkdir -p .k3s
          docker compose --profile k8s up -d --wait k3s

      - name: Install Agones
        run: docker compose --profile k8s run --rm agones-install

      - name: Run e2e suite
        run: go test -race -tags=e2e -timeout=300s -v ./e2e/...

      - name: Capture compose logs on failure
        if: failure()
        run: |
          mkdir -p compose-logs
          docker compose --profile k8s logs --no-color > compose-logs/all.log
          docker compose --profile k8s ps > compose-logs/ps.txt

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: compose-logs
          path: compose-logs/
          retention-days: 7

  # GHCR image publishing is deferred. Phase 0 scope is testing + building
  # only. Re-enable when we're ready to ship images. When uncommenting, also
  # bump `docker-build` cache scoping if needed.
