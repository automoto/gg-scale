# Doomerang Fleet — driven by the matchmaker via the agones backend.
# The allocator (internal/fleet/agones/backend.go) creates a
# GameServerAllocation against this Fleet's pods on every matchmaker
# ticket. Operators apply this manifest with kubectl or GitOps; ggscale
# itself only reads from Fleets, it does not create them.
#
# Region: the allocator adds ggscale.region=<req.Region> to the
# GameServerSelector when the matchmaker request carries a region, so
# pods MUST carry the matching label or allocation fails. Update the
# region label per cluster (us-east-1, us-west-1, eu-1).
apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: doomerang
  namespace: default
  labels:
    app: doomerang
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"
  template:
    metadata:
      labels:
        app: doomerang
        # Allocator selector key — see selectorWithRegion in
        # internal/fleet/agones/backend.go. Set per cluster.
        ggscale.region: us-east-1
    spec:
      ports:
        - name: default
          portPolicy: Dynamic
          containerPort: 7373
          protocol: UDP
      # SDK sidecar heartbeat. The game server calls sdk.Health() every
      # 2s (agonesHealthInterval in cmd/server/agones.go), comfortably
      # under periodSeconds * failureThreshold = 15s grace.
      health:
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
      template:
        spec:
          # Drain budget: Server.Drain waits up to 30s for an in-flight
          # match to end before stopping the loop. 60s leaves headroom
          # for the SDK to send Shutdown and the pod to exit cleanly.
          terminationGracePeriodSeconds: 60
          containers:
            - name: doomerang-server
              # Pinned to the buildwrangler/doomerang-server v0.1.0 digest so
              # an accidental :v0.1.0 force-push can't change what gets
              # allocated. Bump in lockstep with the release tag.
              image: buildwrangler/doomerang-server@sha256:47ae12bb8d4e129afc17068df434dada6d0a043cbbcd9fab95bc04a7fa249fa4
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
