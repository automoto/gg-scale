# Doomerang Fleet — us-west region. See doomerang-east.yaml for the
# detailed comments — this file mirrors that one with region labels and
# nodeSelector flipped to us-west.
apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: doomerang-west
  namespace: default
  labels:
    app: doomerang
    ggscale.region: us-west
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"
  template:
    metadata:
      labels:
        app: doomerang
        ggscale.region: us-west
    spec:
      ports:
        - name: default
          portPolicy: Dynamic
          containerPort: 7373
          protocol: TCP
      health:
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
      template:
        spec:
          terminationGracePeriodSeconds: 60
          nodeSelector:
            ggscale.region: us-west
          volumes:
            - name: ggscale-secret
              secret:
                secretName: doomerang-ggscale-secret
                items:
                  - key: secret-key
                    path: ggscale-secret
          containers:
            - name: doomerang-server
              image: buildwrangler/doomerang-server@sha256:d5373a1d9190dbd1fa8fc645365ef17f5e2ddf3689249653d5862e3e643b941f
              imagePullPolicy: IfNotPresent
              env:
                - name: GGSCALE_URL
                  value: "https://api.ggscale.com"
                - name: GGSCALE_SECRET_KEY_FILE
                  value: "/etc/doomerang/ggscale-secret"
                - name: GGSCALE_FLEET
                  value: "doomerang-west"
                - name: REGION
                  value: "us-west"
              volumeMounts:
                - name: ggscale-secret
                  mountPath: /etc/doomerang
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
