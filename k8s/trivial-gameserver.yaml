# Minimal Agones GameServer used by the Phase 0 e2e smoke test.
# Uses Agones' simple-game-server image which echoes UDP messages.
apiVersion: agones.dev/v1
kind: GameServer
metadata:
  name: ggscale-smoke
  namespace: default
spec:
  ports:
    - name: default
      portPolicy: Dynamic
      containerPort: 7654
      protocol: UDP
  template:
    spec:
      containers:
        - name: simple-game-server
          image: gcr.io/agones-images/simple-game-server:0.27
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
