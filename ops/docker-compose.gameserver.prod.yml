# Production overlay — apply on top of docker-compose.gameserver.yml.
#
# Usage:
#   docker compose \
#     -f docker-compose.yml \
#     -f ops/docker-compose.gameserver.yml \
#     -f ops/docker-compose.gameserver.prod.yml \
#     up -d --wait
#
# SECURITY — read before exposing to the internet:
#   Docker writes iptables rules directly and bypasses ufw/firewalld. A port
#   mapped to 0.0.0.0 (the default) is reachable from the public internet even
#   if your host firewall says otherwise. See docs/SELF_HOSTING.md §"UDP security"
#   for hardening steps, including iptables rate limiting and session-token
#   requirements for game server implementations.
#
#   Set GAME_SERVER_BIND_ADDR to restrict which NIC the port is bound to, e.g.:
#     GAME_SERVER_BIND_ADDR=203.0.113.1   # public NIC only
#     GAME_SERVER_BIND_ADDR=127.0.0.1     # loopback only (put a proxy in front)
#
# SCALING:
#   Uncomment doomerang-server-2 (and so on) to run multiple instances. Each
#   needs a distinct host port. Static port mapping is practical up to ~20
#   servers; beyond that switch to FLEET_BACKEND=docker (Phase 2) so ggscale
#   assigns ports dynamically and you don't manage this file manually.

name: ggscale

services:

  doomerang-server:
    ports:
      - "${GAME_SERVER_BIND_ADDR:-0.0.0.0}:7654:7654/udp"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

