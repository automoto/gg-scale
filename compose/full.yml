# Full development stack.
#
# Builds on the Docker fleet backend (`compose/fleet-docker.yml`) and adds
# Prometheus for metrics scraping.
#
# Usage:
#   make up-full
#   # or manually:
#   docker compose --project-directory . -f compose/full.yml up -d --wait
#
# Endpoints:
#   ggscale-server:  http://localhost:8080
#   control panel:  http://localhost:8080/v1/control-panel
#   prometheus:      http://localhost:9090
#   mailhog UI:      http://localhost:8025

name: ggscale

include:
  - path: ./fleet-docker.yml

services:

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus-data:
