# apispec configuration for generating the ggscale OpenAPI spec.
#
# Usage: apispec --dir . --config apispec.yaml --output openapi.yaml
#
# A --config file REPLACES apispec's built-in chi defaults, so this file
# restates them (routePatterns, mountPatterns, etc.) and adds:
#   - request/response patterns for our decodeJSON/writeJSON helpers
#   - security schemes for the tenant API key and player session token
#   - package excludes for the HTML surfaces (dashboard, players, webassets)
framework:
    routePatterns:
        - callRegex: (?i)(GET|POST|PUT|DELETE|PATCH|OPTIONS|HEAD)$
          recvTypeRegex: ^github.com/go-chi/chi(/v\d)?\.\*?(Router|Mux)$
          handlerArgIndex: 1
          methodFromCall: true
          pathFromArg: true
          handlerFromArg: true
    requestBodyPatterns:
        # ggscale helper: decodeJSON(w, r, &req) — same-package call, so no
        # receiver/package qualifier to match on; the lowercase name is unique.
        - callRegex: ^decodeJSON$
          typeArgIndex: 2
          typeFromArg: true
          deref: true
        - callRegex: ^DecodeJSON$
          recvTypeRegex: ^github\.com/go-chi/render$
          typeArgIndex: 1
          typeFromArg: true
          deref: true
          requireRequestSource: true
        - callRegex: ^Decode$
          recvTypeRegex: .*json(iter)?\.\*Decoder
          typeFromArg: true
          deref: true
          requireRequestSource: true
          bodyFromReceiver: true
        - callRegex: ^Unmarshal$
          recvTypeRegex: json
          typeArgIndex: 1
          typeFromArg: true
          deref: true
          requireRequestSource: true
    responsePatterns:
        # ggscale helpers — same-package calls, matched by name.
        # writeJSON never calls WriteHeader, so net/http's implicit 200 applies.
        - callRegex: ^writeJSON$
          typeArgIndex: 1
          typeFromArg: true
          deref: true
        # writeJSONStatus(w, status, body) pairs an explicit status with the body.
        - callRegex: ^writeJSONStatus$
          statusArgIndex: 1
          typeArgIndex: 2
          statusFromArg: true
          typeFromArg: true
          deref: true
        - callRegex: ^WriteHeader$
          recvTypeRegex: ^net/http\.ResponseWriter$
          typeArgIndex: -1
          statusFromArg: true
        - callRegex: ^Write$
          recvTypeRegex: ^net/http\.ResponseWriter$
          typeFromArg: true
          deref: true
        - callRegex: ^Error$
          recvTypeRegex: ^net/http$
          statusArgIndex: 2
          typeArgIndex: 1
          statusFromArg: true
          typeFromArg: true
          defaultContentType: text/plain; charset=utf-8
        - callRegex: ^NotFound$
          recvTypeRegex: ^net/http$
          statusArgIndex: -1
          typeArgIndex: -1
          defaultStatus: 404
        - callRegex: ^Redirect$
          recvTypeRegex: ^net/http$
          statusArgIndex: 3
          typeArgIndex: -1
          statusFromArg: true
        - callRegex: ^JSON$
          recvTypeRegex: ^github\.com/go-chi/render$
          typeArgIndex: 2
          typeFromArg: true
          deref: true
        - callRegex: ^Status$
          recvTypeRegex: ^github\.com/go-chi/render$
          statusArgIndex: 1
          statusFromArg: true
        # NOTE: apispec's default chi config also matches bare `^Marshal$` as a
        # response body. We drop the global form: handlers here json.Marshal
        # WebSocket hub payloads, which contaminated /v1/presence and /v1/ws
        # with non-HTTP types. The leaderboard handlers marshal their real HTTP
        # payload (cached bytes), so they get a caller-scoped Marshal pattern.
        - callRegex: ^Marshal$
          functionNameRegex: leaderboard
          typeFromArg: true
          deref: true
        - callRegex: ^Encode$
          recvTypeRegex: .*json(iter)?\.\*?Encoder
          typeFromArg: true
          deref: true
    paramPatterns:
        - callRegex: ^URLParam$
          recvTypeRegex: ^github\.com/go-chi/chi(/v\d)?$
          paramIn: path
          paramArgIndex: 1
        - callRegex: ^URLParam$
          recvTypeRegex: ^github\.com/go-chi/chi(/v\d)?\.\*?Context$
          paramIn: path
        - callRegex: ^URLParamFromCtx$
          recvTypeRegex: ^github\.com/go-chi/chi(/v\d)?$
          paramIn: path
          paramArgIndex: 1
        - callRegex: ^FormValue$
          paramIn: form
        - callRegex: ^Get$
          recvType: net/url.Values
          paramIn: query
        - callRegex: ^PathValue$
          recvType: net/http.*Request
          paramIn: path
    mountPatterns:
        - callRegex: ^Mount$
          routerArgIndex: 1
          pathFromArg: true
          routerFromArg: true
          isMount: true
        - callRegex: ^Route$
          routerArgIndex: 1
          pathFromArg: true
          routerFromArg: true
          isMount: true
    securityPatterns:
        - callRegex: ^Use$
          recvTypeRegex: ^github\.com/go-chi/chi(/v\d)?\.\*?(Router|Mux)$
          scope: router
          middlewareVariadic: true
        - callRegex: ^With$
          recvTypeRegex: ^github\.com/go-chi/chi(/v\d)?\.\*?(Router|Mux)$
          scope: route
          middlewareVariadic: true
    requestContext:
        typeRegexes:
            - ^\*?net/http\.Request$
        bodyAccessors:
            - ^Body$
exclude:
    packages:
        - github.com/ggscale/ggscale/internal/dashboard
        - github.com/ggscale/ggscale/internal/players
        - github.com/ggscale/ggscale/internal/webassets
defaults:
    requestContentType: application/json
    responseContentType: application/json
    responseStatus: 200
info:
    title: ggscale API
    description: >-
        Player-facing and game-server-facing HTTP API for ggscale.
        Authenticate with a tenant API key (Authorization: Bearer). Player
        endpoints additionally require a session token in X-Session-Token.
    version: 1.0.0
    contact:
        name: ggscale
        url: https://github.com/ggscale/ggscale
servers:
    - url: http://localhost:8080
      description: Local development server (default HTTP_ADDR)
    - url: https://{host}
      description: Self-hosted or managed deployment
      variables:
        host:
            default: ggscale.example.com
securitySchemes:
    ApiKeyAuth:
        type: http
        scheme: bearer
        description: Tenant API key (publishable or secret).
    PlayerSession:
        type: apiKey
        in: header
        name: X-Session-Token
        description: Player session JWT issued by the /v1/auth endpoints.
securityMappings:
    - functionNameRegex: ^New$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/tenant$
      schemes:
        - ApiKeyAuth: []
    - functionNameRegex: ^New$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/playerauth$
      schemes:
        - PlayerSession: []
    # Authorization refinements on the API key (scopes/RBAC), not separate auth.
    - functionNameRegex: ^(RequireKeyType|RequireKeyScope)$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/tenant$
      skip: true
    - functionNameRegex: ^requireAPIKeyPermission$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/httpapi$
      skip: true
    # Utility middleware: request-id, versioning, metrics, rate limits, panic recovery, CORS.
    - functionNameRegex: ^(NewRequestID|NewVersion|NewObservability)$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/middleware$
      skip: true
    - functionNameRegex: ^(New|NewIPLimiter|NewPlayerLimiter)$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/ratelimit$
      skip: true
    - functionNameRegex: ^panicRecover$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/httpapi$
      skip: true
    - functionNameRegex: ^Handler$
      pkgRegex: ^github\.com/go-chi/cors$
      skip: true
    - functionNameRegex: ^(SecurityHeaders|PlayerSecurityHeaders|CSRFCookie|RequireCSRF)$
      pkgRegex: ^github\.com/ggscale/ggscale/internal/webutil$
      skip: true
    - functionNameRegex: ^Parse(WithClaims|FromRequest|FromRequestWithClaims)?$
      pkgRegex: ^github\.com/(golang-jwt/jwt(/v\d+)?|dgrijalva/jwt-go)$
      skip: true
