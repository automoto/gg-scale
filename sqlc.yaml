version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: internal/db/queries
    gen:
      go:
        package: sqlcgen
        out: internal/db/sqlc
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: false
        # citext (the case-insensitive email type) has no built-in sqlc mapping,
        # so without this it generates as interface{}. Map it to string; with
        # emit_pointers_for_null_types above, nullable citext columns become
        # *string, matching how email was typed before it moved to citext.
        overrides:
          - db_type: "public.citext"
            go_type: "string"
          - db_type: "public.citext"
            nullable: true
            go_type:
              type: "string"
              pointer: true
        rename:
          api_key: APIKey
          api_keys: APIKeys
