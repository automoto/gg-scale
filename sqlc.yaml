version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: internal/db/queries
    gen:
      go:
        package: sqlcgen
        out: internal/db/sqlc
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: true
        emit_json_tags: false
        emit_db_tags: false
        rename:
          api_key: APIKey
          api_keys: APIKeys
