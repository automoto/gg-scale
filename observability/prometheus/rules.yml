groups:
  - name: ggscale-control-plane
    rules:
      - alert: ErrorRateHigh
        expr: |
          sum(rate(ggscale_http_errors_total{status_class="5xx"}[5m]))
            / sum(rate(ggscale_http_request_duration_seconds_count[5m])) > 0.02
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "5xx error rate above 2% for 10 minutes"
          runbook: docs/RUNBOOK.md

      - alert: HTTPLatencyP99TooSlow
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(ggscale_http_request_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "HTTP p99 above 500 ms for 10 minutes"

      - alert: DBQueryP99TooSlow
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(ggscale_db_query_duration_seconds_bucket[5m]))
          ) > 0.25
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Postgres query p99 above 250 ms for 10 minutes"

      # Cache-error / cache-miss alert removed 2026-04-28 with the
      # Redis-protocol backend retirement. Replacement is a
      # backend-agnostic alert keyed off the cache.Store instrumentation
      # wrapper that lands with m1.md §5.4. See docs/m1.md and
      # docs/summary-m1.md.

      - alert: RatelimitThrottleSpike
        expr: |
          sum(rate(ggscale_ratelimit_throttled_total[5m])) > 100
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Rate-limit throttle volume above 100 req/s — investigate source tenant"
