name: ggscale

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ggscale
      POSTGRES_PASSWORD: ggscale
      POSTGRES_DB: ggscale
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./compose/init-sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggscale -d ggscale"]
      interval: 2s
      timeout: 3s
      retries: 30
    logging: *default-logging

  migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://ggscale:ggscale@postgres:5432/ggscale?sslmode=disable",
        "up"
      ]
    restart: "no"
    logging: *default-logging

  ggscale-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ggscale-server:latest
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    environment:
      DATABASE_URL: postgres://ggscale:ggscale@postgres:5432/ggscale?sslmode=disable
      CACHE_BACKEND: memory
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
      ENV: production
      MAIL_PROVIDER: smtp
      SMTP_ADDR: "mailhog:1025"
      MAIL_FROM: "noreply@ggscale.dev"
    ports:
      - "8080:8080"
    logging: *default-logging

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
    logging: *default-logging

volumes:
  postgres-data:
