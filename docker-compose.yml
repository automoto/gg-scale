name: ggscale

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ggscale
      POSTGRES_PASSWORD: ggscale
      POSTGRES_DB: ggscale
    # Bind to the loopback interface only — the dev stack shouldn't expose
    # Postgres on every interface with default credentials.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./compose/init-sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggscale -d ggscale"]
      interval: 2s
      timeout: 3s
      retries: 30
    logging: *default-logging

  migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://ggscale:ggscale@postgres:5432/ggscale?sslmode=disable",
        "up"
      ]
    restart: "no"
    logging: *default-logging

  ggscale-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ggscale-server:latest
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    environment:
      DATABASE_URL: postgres://ggscale:ggscale@postgres:5432/ggscale?sslmode=disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
      # ENV=dev so the production cross-validation (CORS, secure cookies,
      # JWT key, digest pinning) doesn't refuse to start the local stack.
      # Production deployments set ENV=production via their own manifest.
      ENV: dev
      MAIL_PROVIDER: smtp
      SMTP_ADDR: "mailhog:1025"
      # MailHog speaks plain SMTP only; turn TLS off for the dev stack.
      SMTP_TLS: "off"
      MAIL_FROM: "noreply@ggscale.dev"
      CONTROL_PANEL_DISABLED: "false"
      CONTROL_PANEL_COOKIE_SECURE: "false"
      # First-run bootstrap token is written here; read with: cat ./data/bootstrap.token
      CONTROL_PANEL_BOOTSTRAP_TOKEN_FILE: /run/ggscale/bootstrap.token
    volumes:
      - ./data:/run/ggscale
    ports:
      - "8080:8080"
    logging: *default-logging

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
    logging: *default-logging

volumes:
  postgres-data:
