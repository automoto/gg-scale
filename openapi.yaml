components:
  schemas:
    AnonymousResponse:
      additionalProperties: false
      properties:
        access_token:
          type: string
        expires_at:
          type: string
        external_id:
          type: string
        player_id:
          format: int64
          type: integer
        refresh_token:
          type: string
      required:
        - access_token
        - refresh_token
        - player_id
        - external_id
        - expires_at
      type: object
    Credentials:
      additionalProperties: false
      properties:
        password:
          type: string
        realm:
          type: string
        ttl:
          format: int64
          type: integer
        urls:
          items:
            type: string
          type:
            - array
            - "null"
        username:
          type: string
      required:
        - username
        - password
        - ttl
        - realm
      type: object
    CustomTokenRequest:
      additionalProperties: false
      properties:
        token:
          minLength: 1
          type: string
      required:
        - token
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    FriendEntry:
      additionalProperties: false
      properties:
        account_id:
          type: string
        created_at:
          type: string
        display_name:
          type: string
        email:
          type: string
        id:
          format: int64
          type: integer
        player_id:
          format: int64
          type: integer
        presence:
          $ref: "#/components/schemas/FriendPresence"
        status:
          type: string
        updated_at:
          type: string
      required:
        - id
        - account_id
        - status
        - created_at
        - updated_at
      type: object
    FriendPresence:
      additionalProperties: false
      properties:
        session_id:
          type:
            - string
            - "null"
        status:
          type: string
      required:
        - status
        - session_id
      type: object
    FriendStatusResult:
      additionalProperties: false
      properties:
        status:
          type: string
      required:
        - status
      type: object
    FriendsListResult:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/FriendEntry"
          type:
            - array
            - "null"
        next_cursor:
          type: string
      required:
        - items
        - next_cursor
      type: object
    GameInviteCreateOutputBody:
      additionalProperties: false
      properties:
        invite_id:
          format: int64
          type: integer
      required:
        - invite_id
      type: object
    GameInviteCreateRequest:
      additionalProperties: false
      properties:
        session_id:
          minLength: 1
          type: string
        to_email:
          minLength: 1
          type: string
      required:
        - to_email
        - session_id
      type: object
    GameInviteEntry:
      additionalProperties: false
      properties:
        expires_at:
          type: string
        from_email:
          type: string
        from_xuid:
          type: string
        invite_id:
          format: int64
          type: integer
        join_code:
          type: string
        session_id:
          type: string
      required:
        - invite_id
        - session_id
        - join_code
        - expires_at
      type: object
    GameInviteListOutputBody:
      additionalProperties: false
      properties:
        invites:
          items:
            $ref: "#/components/schemas/GameInviteEntry"
          type:
            - array
            - "null"
      required:
        - invites
      type: object
    GameSessionAddr:
      additionalProperties: false
      properties:
        ip:
          type: string
        port:
          format: int64
          type: integer
      required:
        - ip
        - port
      type: object
    GameSessionCreateRequest:
      additionalProperties: false
      properties:
        max_players:
          format: int64
          type: integer
        private:
          type: boolean
        props: {}
        public_addr:
          $ref: "#/components/schemas/GameSessionAddr"
        title_id:
          type: string
      type: object
    GameSessionHeartbeatRequest:
      additionalProperties: false
      properties:
        qos: {}
      type: object
    GameSessionHeartbeatResult:
      additionalProperties: false
      properties:
        ok:
          type: boolean
        peers:
          items:
            $ref: "#/components/schemas/PeerEntry"
          type:
            - array
            - "null"
      required:
        - ok
        - peers
      type: object
    GameSessionJoinRequest:
      additionalProperties: false
      properties:
        public_addr:
          $ref: "#/components/schemas/GameSessionAddr"
      type: object
    GameSessionResolveResult:
      additionalProperties: false
      properties:
        session_id:
          type: string
      required:
        - session_id
      type: object
    GameSessionResponse:
      additionalProperties: false
      properties:
        join_code:
          type: string
        peers:
          items:
            $ref: "#/components/schemas/PeerEntry"
          type:
            - array
            - "null"
        session_id:
          type: string
        state:
          type: string
      required:
        - session_id
        - join_code
        - state
        - peers
      type: object
    HealthzResult:
      additionalProperties: false
      properties:
        commit:
          type: string
        status:
          type: string
        version:
          type: string
      required:
        - status
        - version
        - commit
      type: object
    HeartbeatRequest:
      additionalProperties: false
      properties:
        address:
          type: string
        agones_name:
          type: string
        current_players:
          format: int64
          type: integer
        fleet:
          type: string
        game_mode:
          type: string
        level:
          type: string
        max_players:
          format: int64
          type: integer
        name:
          type: string
        region:
          type: string
        version:
          type: string
      type: object
    LeaderboardAroundMeResult:
      additionalProperties: false
      properties:
        entries:
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
          type:
            - array
            - "null"
        self_rank:
          format: int64
          type: integer
      required:
        - entries
        - self_rank
      type: object
    LeaderboardEntry:
      additionalProperties: false
      properties:
        player_id:
          format: int64
          type: integer
        rank:
          format: int64
          type: integer
        score:
          format: int64
          type: integer
      required:
        - player_id
        - score
        - rank
      type: object
    LeaderboardTopResult:
      additionalProperties: false
      properties:
        entries:
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
          type:
            - array
            - "null"
      required:
        - entries
      type: object
    ListServersResponse:
      additionalProperties: false
      properties:
        servers:
          items:
            $ref: "#/components/schemas/Server"
          type:
            - array
            - "null"
      required:
        - servers
      type: object
    LoginRequest:
      additionalProperties: false
      properties:
        email:
          type: string
        password:
          type: string
      type: object
    LogoutRequest:
      additionalProperties: false
      properties:
        refresh_token:
          minLength: 1
          type: string
      required:
        - refresh_token
      type: object
    MatchmakerTicketRequest:
      additionalProperties: false
      properties:
        allow_cross_region:
          type: boolean
        attributes: {}
        count_multiple:
          format: int64
          type: integer
        fleet:
          type: string
        game_mode:
          type: string
        max_count:
          format: int64
          type: integer
        min_count:
          format: int64
          type: integer
        mode:
          type: string
        numeric_properties:
          additionalProperties:
            format: double
            type: number
          type: object
        query:
          type: string
        region:
          type: string
        string_properties:
          additionalProperties:
            type: string
          type: object
      type: object
    MatchmakerTicketResponse:
      additionalProperties: false
      properties:
        allow_cross_region:
          type: boolean
        attributes: {}
        count_multiple:
          format: int64
          type: integer
        created_at:
          type: string
        expires_at:
          type: string
        game_mode:
          type: string
        id:
          format: int64
          type: integer
        join_code:
          type: string
        match_address:
          type: string
        match_id:
          type: string
        matched_at:
          type: string
        max_count:
          format: int64
          type: integer
        min_count:
          format: int64
          type: integer
        mode:
          type: string
        numeric_properties:
          additionalProperties:
            format: double
            type: number
          type: object
        protocol_hint:
          type: string
        query:
          type: string
        region:
          type: string
        session_id:
          type: string
        status:
          type: string
        string_properties:
          additionalProperties:
            type: string
          type: object
        users:
          items:
            $ref: "#/components/schemas/RosterEntry"
          type:
            - array
            - "null"
      required:
        - id
        - status
        - mode
        - region
        - allow_cross_region
        - game_mode
        - min_count
        - max_count
        - count_multiple
        - match_address
        - created_at
      type: object
    OkResult:
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required:
        - ok
      type: object
    PeerEntry:
      additionalProperties: false
      properties:
        addr:
          $ref: "#/components/schemas/GameSessionAddr"
        player_id:
          format: int64
          type: integer
        relay: {}
        xuid:
          type: string
      required:
        - player_id
        - addr
        - relay
      type: object
    PlayerVerifyRequest:
      additionalProperties: false
      properties:
        session_token:
          type: string
      required:
        - session_token
      type: object
    PlayerVerifyResponse:
      additionalProperties: false
      properties:
        email:
          type: string
        external_id:
          type: string
        player_id:
          format: int64
          type: integer
      required:
        - player_id
        - external_id
      type: object
    PresenceUpdateRequest:
      additionalProperties: false
      properties:
        session_id:
          type: string
        status:
          maxLength: 32
          minLength: 1
          type: string
      required:
        - status
      type: object
    ProfilePatchRequest:
      additionalProperties: false
      properties:
        email:
          type: string
        xuid:
          type: string
      type: object
    ProfileResponse:
      additionalProperties: false
      properties:
        created_at:
          type: string
        email:
          type: string
        email_verified_at:
          type: string
        external_id:
          type: string
        id:
          format: int64
          type: integer
        project_id:
          format: int64
          type: integer
        xuid:
          type: string
      required:
        - id
        - project_id
        - external_id
        - created_at
      type: object
    RefreshRequest:
      additionalProperties: false
      properties:
        refresh_token:
          minLength: 1
          type: string
      required:
        - refresh_token
      type: object
    RemoteAddrEntry:
      additionalProperties: false
      properties:
        address:
          type: string
        scope:
          type: string
        type:
          type: string
      type: object
    RemoteAddrsPayload:
      additionalProperties: false
      properties:
        addresses:
          items:
            $ref: "#/components/schemas/RemoteAddrEntry"
          type:
            - array
            - "null"
      required:
        - addresses
      type: object
    RosterEntry:
      additionalProperties: false
      properties:
        numeric_properties:
          additionalProperties:
            format: double
            type: number
          type: object
        player_id:
          format: int64
          type: integer
        region:
          type: string
        string_properties:
          additionalProperties:
            type: string
          type: object
      required:
        - player_id
      type: object
    Server:
      additionalProperties: false
      properties:
        address:
          type: string
        current_players:
          format: int64
          type: integer
        game_mode:
          type: string
        level:
          type: string
        max_players:
          format: int64
          type: integer
        name:
          type: string
        region:
          type: string
        version:
          type: string
      required:
        - name
        - address
        - region
        - current_players
        - max_players
        - game_mode
        - level
        - version
      type: object
    SessionResponse:
      additionalProperties: false
      properties:
        access_token:
          type: string
        expires_at:
          type: string
        player_id:
          format: int64
          type: integer
        refresh_token:
          type: string
      required:
        - access_token
        - refresh_token
        - player_id
        - expires_at
      type: object
    SignupRequest:
      additionalProperties: false
      properties:
        email:
          type: string
        password:
          type: string
      type: object
    StorageListResult:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/StorageObjectListItemResponse"
          type:
            - array
            - "null"
        next_cursor:
          type: string
      required:
        - items
        - next_cursor
      type: object
    StorageObjectListItemResponse:
      additionalProperties: false
      properties:
        key:
          type: string
        size_bytes:
          format: int64
          type: integer
        updated_at:
          type: string
        version:
          format: int64
          type: integer
      required:
        - key
        - version
        - updated_at
        - size_bytes
      type: object
    StorageObjectResponse:
      additionalProperties: false
      properties:
        key:
          type: string
        updated_at:
          type: string
        value: {}
        version:
          format: int64
          type: integer
      required:
        - key
        - value
        - version
        - updated_at
      type: object
    SubmitScoreRequest:
      additionalProperties: false
      properties:
        score:
          format: int64
          type: integer
      type: object
    VerifyRequest:
      additionalProperties: false
      properties:
        code:
          minLength: 1
          type: string
        email:
          minLength: 1
          type: string
      required:
        - email
        - code
      type: object
    VerifyResult:
      additionalProperties: false
      properties:
        player_id:
          format: int64
          type: integer
        verified:
          type: boolean
      required:
        - player_id
        - verified
      type: object
  securitySchemes:
    ApiKeyAuth:
      description: Tenant API key (publishable or secret).
      scheme: bearer
      type: http
    PlayerSession:
      description: Player session JWT issued by the /v1/auth endpoints.
      in: header
      name: X-Session-Token
      type: apiKey
info:
  contact:
    name: ggscale
    url: https://github.com/ggscale/ggscale
  description: "Player-facing and game-server-facing HTTP API for ggscale. Authenticate with a tenant API key (Authorization: Bearer). Player endpoints additionally require a session token in X-Session-Token."
  title: ggscale API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/account/remote-addrs:
    get:
      operationId: getAccountRemoteAddrs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoteAddrsPayload"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
          PlayerSession: []
      summary: Get the caller's remote addresses
      tags:
        - /v1
    put:
      operationId: putAccountRemoteAddrs
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoteAddrsPayload"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoteAddrsPayload"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
          PlayerSession: []
      summary: Replace the caller's remote addresses
      tags:
        - /v1
  /v1/auth/anonymous:
    post:
      operationId: authAnonymous
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnonymousResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Create an anonymous player session
      tags:
        - /v1
  /v1/auth/custom-token:
    post:
      operationId: authCustomToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Exchange a tenant-signed token for a session
      tags:
        - /v1
  /v1/auth/login:
    post:
      operationId: authLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Log in with email and password
      tags:
        - /v1
  /v1/auth/logout:
    post:
      operationId: authLogout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Revoke a refresh token
      tags:
        - /v1
  /v1/auth/refresh:
    post:
      operationId: authRefresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Rotate a refresh token
      tags:
        - /v1
  /v1/auth/signup:
    post:
      operationId: authSignup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
        required: true
      responses:
        "202":
          description: Accepted
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Sign up with email and password
      tags:
        - /v1
  /v1/auth/verify:
    post:
      operationId: authVerify
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResult"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Verify an email address with a code
      tags:
        - /v1
  /v1/fleets/heartbeat:
    post:
      operationId: fleetHeartbeat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
      summary: Game-server liveness heartbeat
      tags:
        - /v1
  /v1/fleets/{fleet}/servers:
    get:
      operationId: fleetServersList
      parameters:
        - in: path
          name: fleet
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServersResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
          PlayerSession: []
      summary: List live servers in a fleet
      tags:
        - /v1
  /v1/friends:
    get:
      operationId: listFriends
      parameters:
        - explode: false
          in: query
          name: status
          schema:
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            type: string
        - explode: false
          in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendsListResult"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
          PlayerSession: []
      summary: List the caller's friends by status
      tags:
        - /v1
  /v1/friends/{player_id}:
    delete:
      operationId: deleteFriend
      parameters:
        - in: path
          name: player_id
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
          PlayerSession: []
      summary: Remove a friend
      tags:
        - /v1
  /v1/friends/{player_id}/accept:
    post:
      operationId: acceptFriend
      parameters:
        - in: path
          name: player_id
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendStatusResult"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - ApiKeyAuth: []
          PlayerSession: []
      summary: Accept a friend request
      tags:
        - /v1
